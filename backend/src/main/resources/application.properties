server.port=${PORT:8083}

# Configuración de la base de datos PostgreSQL con Neon
# Pooled connection (para producción/Render)
spring.datasource.url=jdbc:postgresql://${DB_HOST:ep-delicate-sound-ailtkjb8-pooler.c-4.us-east-1.aws.neon.tech}:5432/${DB_NAME:neondb}?sslmode=require
spring.datasource.username=${DB_USERNAME:neondb_owner}
spring.datasource.password=${DB_PASSWORD:npg_g9BpjO5woiJA}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ============================================
# CONFIGURACIÓN DE RENDIMIENTO (OPTIMIZADO)
# ============================================

# 🚀 Compresión de respuestas HTTP
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
server.compression.min-response-size=512

# 🚀 Optimización del pool de conexiones HikariCP
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=8
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=SidafHikariPool
spring.datasource.hikari.auto-commit=true

# 🚀 Caché en aplicación (Framework)
spring.cache.type=simple
spring.cache.cache-names=arbitros,equipos,campeonatos,designaciones,asistencias

# 🚀 Optimization de Hibernate para queries
spring.jpa.properties.hibernate.jdbc.fetch_size=50
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# 🚀 Timeouts mejorados
server.servlet.session.timeout=30m
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10

# Configuración de CORS
spring.servlet.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,https://sidaf-puno-neon.vercel.app}

# Configuración de JWT
app.jwt.secret=${JWT_SECRET:sidaf-puno-secret-key-2024-muy-largo-para-seguridad}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
