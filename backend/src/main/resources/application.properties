server.port=${PORT:8083}

# Si DATABASE_URL está configurada ( formato: postgresql://user:pass@host:5432/db )
# la convertimos a formato JDBC
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/sidaf_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Si se usa la URL completa de Supabase, necesitamos manejarla diferente
# El driver de PostgreSQL no acepta directamente el formato postgresql://
#，所以我们需要手动处理URL
spring.datasource.hikari.jdbc-url=${DATABASE_URL:jdbc:postgresql://localhost:5432/sidaf_db}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Configuración de CORS
spring.servlet.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Configuración de JWT
app.jwt.secret=${JWT_SECRET:sidaf-puno-secret-key-2024}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
