server.port=${PORT:8083}

# Configuración de la base de datos PostgreSQL con Supabase
# Usar el pooler en puerto 6543 con SSL requerido
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:6543}/${DB_NAME:postgres}?sslmode=require
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuración de JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# Configuración de CORS
spring.servlet.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# Configuración de JWT
app.jwt.secret=${JWT_SECRET:sidaf-puno-secret-key-2024-muy-largo-para-seguridad}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
